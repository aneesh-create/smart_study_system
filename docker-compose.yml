version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=change-me-in-production
      - JWT_SECRET_KEY=change-jwt-secret-too
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=sqlite:////app/study_system.db
    volumes:
      - backend_data:/app
    networks:
      - studyai_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - studyai_net

volumes:
  backend_data:

networks:
  studyai_net:
    driver: bridge
